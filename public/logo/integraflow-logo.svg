<svg width="160" height="160" viewBox="0 0 160 160"
     xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Gradient -->
  <defs>
    <linearGradient id="flowGradient" x1="0" y1="0" x2="160" y2="160">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Block 1 -->
  <rect x="20" y="20" width="40" height="40" rx="10"
        stroke="url(#flowGradient)"
        stroke-width="4"/>

  <!-- Block 2 -->
  <rect x="100" y="20" width="40" height="40" rx="10"
        stroke="url(#flowGradient)"
        stroke-width="4"/>

  <!-- Block 3 -->
  <rect x="60" y="100" width="40" height="40" rx="10"
        stroke="url(#flowGradient)"
        stroke-width="4"/>

  <!-- Connections -->
  <line x1="60" y1="40" x2="100" y2="40"
        stroke="url(#flowGradient)"
        stroke-width="4"
        stroke-linecap="round"/>

  <line x1="40" y1="60" x2="80" y2="100"
        stroke="url(#flowGradient)"
        stroke-width="4"
        stroke-linecap="round"/>

  <line x1="120" y1="60" x2="80" y2="100"
        stroke="url(#flowGradient)"
        stroke-width="4"
        stroke-linecap="round"/>

</svg>
